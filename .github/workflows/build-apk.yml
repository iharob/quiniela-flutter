name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: Git tag to build and attach APKs to (e.g. v1.2.3). When set, APKs are uploaded to the matching GitHub Release.
        required: false
        type: string

env:
  # Opt JavaScript actions into Node.js 24 ahead of GitHub's June 2026 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is not set; release build will fail." >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/quiniela-upload.keystore

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "GOOGLE_SERVICES_JSON_BASE64 secret is not set; release build will fail." >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (split per ABI)
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          version=$(sed -n 's/^version: *\([^+]*\).*/\1/p' pubspec.yaml)
          if [ -z "$version" ]; then
            echo "Could not parse version from pubspec.yaml" >&2
            exit 1
          fi
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            filename=$(basename "$apk")
            abi=${filename#app-}
            abi=${abi%-release.apk}
            cp "$apk" "artifacts/quiniela_2026_v${version}_${abi}.apk"
          done

      - name: Upload APKs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiniela-apks
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
