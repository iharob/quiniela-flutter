include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - '**/*.freezed.dart'
    - '**/*.g.dart'
    - 'lib/core/di/injection.config.dart'
  errors:
    # Freezed propagates @JsonKey to generated code, which the analyzer flags
    # as `invalid_annotation_target`. The annotation works correctly at runtime;
    # demoting to ignore keeps the warning out of CI without masking real issues.
    invalid_annotation_target: ignore

linter:
  rules:
