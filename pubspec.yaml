name: quiniela_flutter
description: "Quiniela Mundial 2026 Flutter port."
publish_to: 'none'
version: 1.1.3+13

environment:
  sdk: ^3.5.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Routing
  go_router: ^14.6.0

  # Dependency injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Models / unions
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.7.0

  # Persistence
  shared_preferences: ^2.3.2

  # Auth
  google_sign_in: ^6.2.2

  # Firebase / FCM
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Misc
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  equatable: ^2.0.5
  collection: ^1.18.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/flags/
    - assets/rankings.json
